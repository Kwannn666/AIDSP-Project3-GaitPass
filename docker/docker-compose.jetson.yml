version: "2.3"

services:
  gaitpass:
    build:
      context: ..
      dockerfile: docker/Dockerfile.jetson
      args:
        L4T_TAG: ${L4T_TAG:-r35.4.1}
    image: gaitpass-jetson:${L4T_TAG:-r35.4.1}
    container_name: gaitpass-jetson
    network_mode: host
    runtime: nvidia
    environment:
      APP_PORT: ${APP_PORT:-18080}
      CAMERA_SOURCE: ${CAMERA_SOURCE:-0}
      CAMERA_WIDTH: ${CAMERA_WIDTH:-640}
      CAMERA_HEIGHT: ${CAMERA_HEIGHT:-480}
      CAMERA_FPS: ${CAMERA_FPS:-30}
      DETECTOR_MODE: ${DETECTOR_MODE:-onnx}
      MODEL_PATH: ${MODEL_PATH:-models/yolov8n-pose.onnx}
      DETECTOR_CONF: ${DETECTOR_CONF:-0.35}
      KEYPOINT_CONF: ${KEYPOINT_CONF:-0.35}
      MIN_VALID_KEYPOINTS: ${MIN_VALID_KEYPOINTS:-5}
      MIN_BOX_AREA_RATIO: ${MIN_BOX_AREA_RATIO:-0.01}
      SAVE_RAW_FRAMES: ${SAVE_RAW_FRAMES:-0}
      AUTH_THRESHOLD: ${AUTH_THRESHOLD:-0.72}
      UNKNOWN_MARGIN: ${UNKNOWN_MARGIN:-0.03}
      TAILGATING_WINDOW_SEC: ${TAILGATING_WINDOW_SEC:-3.0}
      GATE_LINE_Y_RATIO: ${GATE_LINE_Y_RATIO:-0.55}
      ALERT_ENABLED: ${ALERT_ENABLED:-0}
      ALERT_COOLDOWN_SEC: ${ALERT_COOLDOWN_SEC:-15}
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM: ${TWILIO_FROM:-}
      TWILIO_TO: ${TWILIO_TO:-}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
    volumes:
      - ../models:/workspace/gaitpass/models
      - ../data:/workspace/gaitpass/data
      # For CSI camera pipelines that use nvargus, uncomment this mount.
      # - /tmp/argus_socket:/tmp/argus_socket
    devices:
      - /dev/video0:/dev/video0
    group_add:
      - video
    restart: unless-stopped
